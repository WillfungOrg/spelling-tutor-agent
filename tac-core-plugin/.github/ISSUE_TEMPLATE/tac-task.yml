name: TAC Task
description: Create a task for the TAC agent to complete autonomously
title: "[TAC] "
labels: ["tac:pending"]
body:
  - type: dropdown
    id: work_type
    attributes:
      label: Work Type
      description: What type of work is this?
      options:
        - feature
        - bug
        - chore
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: Describe what needs to be done in detail
      placeholder: |
        Example:
        - Add a new API endpoint for user profile updates
        - Fix the authentication token expiration bug
        - Refactor database query optimization for performance
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: How will we know this task is complete?
      placeholder: |
        - [ ] Feature works as described
        - [ ] Tests pass
        - [ ] Documentation updated (if applicable)
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any extra information that would help the agent complete this task
      placeholder: |
        - Related files: src/api/users.py
        - Similar patterns: See how POST /users works
        - Dependencies: None
    validations:
      required: false
