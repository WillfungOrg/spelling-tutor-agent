name: TAC Cloud Automation

# Trigger when issues are labeled with 'tac:pending'
on:
  issues:
    types: [opened, labeled]

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'tac:pending')

    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      issue_number: ${{ github.event.issue.number }}

    steps:
      - name: Check if TAC should run
        id: check
        run: |
          echo "should_run=true" >> $GITHUB_OUTPUT
          echo "Issue #${{ github.event.issue.number }} has tac:pending label"

  process-issue:
    needs: check-trigger
    runs-on: ubuntu-latest
    if: needs.check-trigger.outputs.should_run == 'true'

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic requests

      - name: Configure Git
        run: |
          git config --global user.name "TAC Cloud Agent"
          git config --global user.email "tac-cloud@github-actions.bot"

      - name: Update issue label to in-progress
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'tac:pending'
            });

            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['tac:in-progress']
            });

      - name: Process issue with Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO_NAME: ${{ github.repository }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os
          import json
          import subprocess
          import sys

          try:
              from anthropic import Anthropic
          except ImportError:
              print("Installing anthropic package...")
              subprocess.run([sys.executable, "-m", "pip", "install", "anthropic"], check=True)
              from anthropic import Anthropic

          # Get environment variables
          api_key = os.environ.get("ANTHROPIC_API_KEY")
          issue_number = os.environ.get("ISSUE_NUMBER")
          issue_title = os.environ.get("ISSUE_TITLE")
          issue_body = os.environ.get("ISSUE_BODY")
          repo_name = os.environ.get("REPO_NAME")

          if not api_key:
              print("❌ ANTHROPIC_API_KEY not set in GitHub Secrets")
              print("Add it at: https://github.com/$REPO_NAME/settings/secrets/actions")
              sys.exit(1)

          print(f"🤖 Processing Issue #{issue_number} with Claude API (Cloud)")
          print(f"📋 Title: {issue_title}")

          # Read tac-process command if available
          try:
              with open(".claude/commands/tac-process.md") as f:
                  instructions = f.read()
          except FileNotFoundError:
              instructions = "Process this GitHub issue and create a PR."

          # Build prompt
          prompt = f"""You are a TAC (Template-Driven Agentic Coding) agent running in GitHub Actions.

{instructions}

CURRENT ISSUE:
Issue #{issue_number}: {issue_title}

{issue_body}

TASK:
Process this issue completely and autonomously:
1. Create a feature branch
2. Implement the requested changes
3. Test the code
4. Commit with a good message
5. Push the branch
6. Create a pull request
7. Update the issue label to 'tac:completed'

Repository: {repo_name}

Execute all steps. Report back when done with PR URL.
"""

          # Call Claude API
          client = Anthropic(api_key=api_key)

          print("☁️ Calling Claude API...")
          response = client.messages.create(
              model="claude-sonnet-4-20250514",
              max_tokens=8192,
              messages=[
                  {"role": "user", "content": prompt}
              ]
          )

          result = response.content[0].text
          print("\n📝 Claude Response:")
          print(result)
          print("\n✅ Processing complete!")

          # Save response for next step
          with open("/tmp/claude-response.txt", "w") as f:
              f.write(result)

          PYTHON_SCRIPT

      - name: Update issue with completion status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let message = '';

            try {
              const response = fs.readFileSync('/tmp/claude-response.txt', 'utf8');
              message = `✅ **TAC Cloud Agent completed processing!**\n\n${response}\n\n---\n🤖 Processed by TAC Cloud Automation`;
            } catch (error) {
              message = `❌ **TAC Cloud Agent encountered an error**\n\nCheck the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`;
            }

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });

            // Update label to completed
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'tac:in-progress'
              });
            } catch (e) {}

            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['tac:completed']
            });
